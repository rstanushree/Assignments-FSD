<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f8f9ff, #ece9ff);
            margin: 0;
            padding: 20px;
        }
        .container{
            background-color: white;
            width: 90%;
            max-width: 500px;
            padding: 15px;
            margin:30px auto;
            text-align: center;
            border-radius: 12px;
            box-shadow:0 12px 30px rgba(124,58,237,0.12);
        }
        h2{
            background-color: #7c3aed;
            color: white;
            padding: 12px;
            margin: -15px -15px 15px -15px;
            border-radius: 12px 12px 0 0;
            letter-spacing: 1px;
            font-size: 26px;
            font-weight: 600;
        }
        .row{
            display: flex;
            align-items: center;
            margin: 12px 0;
            gap:12px;
        }
        .row label{
            width: 140px;
            margin: 0;
            border-radius: 5px 0 0 5px;
        }
        .row input{
            flex: 1;
            margin: 0;
            border-radius: 0 5px 5px 0;
        }
        label{
            font-weight: bold;
            color: #4c1d95;
            display: block;
            text-align: left;
        }
        input{
            flex:1;
            padding:10px 12px;
            border: 1px solid #d8d4fe;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }
        input:focus{
            border-color:#7c3aed;
            box-shadow:0 0 8px rgba(124,58,237,0.2);
        }
        button{
            width: 80%;
            padding: 12px;
            background-color: white;
            color: #7C3AED;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-size:large ;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover{
            background-color: #6d28d9;
            color:white;
            transform: scale(1.05);
        }
        #res{
            margin-top: 20px;
            padding: 18px;
             background: linear-gradient(135deg, #f8f5ff, #ffffff);
            
            border: 2px solid #ddd6fe;
            border-radius: 12px;
            color:#4c1d95;
            line-height: 2;
            text-align: left;
        }
        #res h3{
            margin: 0 0 15px;
            color: black;
            text-align: center;
            border-bottom: 2px solid #ddd6fe;
            padding-bottom: 8px;
        }
        .grade{
            color:white;
            padding:6px 15px;
            border-radius:20px;
            font-weight:bold;
            display:inline-block;
            min-width:45px;
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="container">
    <h2>Grade Calculator</h2>
    <form>
        <div class="row">
        <label>Student Name</label>
        <input type="text" id="name" placeholder="Enter Student Name">
        </div>

        <div class="row">
        <label>Class</label>
        <input type="text" id="class" placeholder="Enter class">
        </div>

        <div class="row">
        <label>Language 1</label>
        <input type="number" id="s1" min="0" max="100"  placeholder="Enter the mark">
        </div>

        <div class="row">
        <label>Language 2</label>
        <input type="number" id="s2" min="0" max="100" placeholder="Enter the mark">
        </div>

        <div class="row">
        <label>Maths</label>
        <input type="number" id="s3" min="0" max="100" placeholder="Enter the mark">
        </div>

        <div class="row">
        <label>Physics</label>
        <input type="number" id="s4" min="0" max="100" placeholder="Enter the mark">
        </div>

        <div class="row">
        <label>Chemistry</label>
        <input type="number" id="s5" min="0" max="100" placeholder="Enter the mark">
        </div>

        <div class="row">
        <label>Biology</label>
        <input type="number" id="s6" min="0" max="100" placeholder="Enter the mark">
        </div>

        <button type="button" onclick="calculategrade()">Calculate Grade</button>
    </form>
    <div id="res"></div>
    </div>

    <script>
        function calculategrade(){

            let studentName=document.getElementById("name").value;
            let studentClass=document.getElementById("class").value;
            let sub1=Number(document.getElementById("s1").value);
            let sub2=Number(document.getElementById("s2").value);
            let sub3=Number(document.getElementById("s3").value);
            let sub4=Number(document.getElementById("s4").value);
            let sub5=Number(document.getElementById("s5").value);
            let sub6=Number(document.getElementById("s6").value);

            if(sub1<0 || sub1>100 ||
               sub2<0 || sub2>100 ||
               sub3<0 || sub3>100 ||
               sub4<0 || sub4>100 ||
               sub5<0 || sub5>100 ||
               sub6<0 || sub6>100){
             document.getElementById("res").innerHTML ="Please enter marks between 0 and 100.";
             return;
            }

            let total=sub1 + sub2+ sub3 + sub4 + sub5 + sub6;
            let avg=(total*100)/600;

            let grade;
            
            if(avg >= 90 && avg<=100){
            grade = "A";
            }
            else if(avg >= 75){
            grade = "B";
            }
            else if(avg >= 60){
            grade = "C";
            }
            else if(avg >= 40){
            grade = "D";
            }
            else if(avg >=0){
            grade = "Fail";
            }
            else{
            grade = "Invalid Marks";
            }

            let gradeColor;

            if(grade=="A"){
                gradeColor="#16a34a";   // Green
            }
            else if(grade=="B"){
                gradeColor="#2563eb";   // Blue
            }
            else if(grade=="C"){
                gradeColor="#f59e0b";   // Orange
            }
            else if(grade=="D"){
                gradeColor="#ea580c";   // Dark Orange
            }
            else{
                gradeColor="#dc2626";   // Red
            }
        document.getElementById("res").innerHTML =
        "<h3>Student Report</h3>" + 
       "<p> <b>Student Name:</b> " + studentName + "</p>" +
       "<p> <b>Class:</b> " + studentClass + "</p>" +
       "<p> <b>Total Marks:</b> " + total + " /600 </p>" +
       "<p> <b>Percentage:</b> " + avg + "%</p>" +
       "<p> <b>Grade:</b> <span class='grade' style='background:" + gradeColor + ";'>" + grade + "</span></p>";
    }
    </script>
</body>
</html>
