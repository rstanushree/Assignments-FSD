<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body{
            background:linear-gradient(135deg,#74ebd5,#9face6);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            }
        .calculator{
            width:380px;
            background:#2D3436;
            padding:20px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            text-align:center;
            }
        h1{
            margin-bottom:20px;
            color:whitesmoke;
            }
        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
            box-sizing:border-box;
            }
        .buttons{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:10px;
            margin-top:15px;
            }
        button{
            width:70px;
            padding:12px;
            font-size:16px;
            border:none;
            border-radius:6px;
            background:#007bff;
            color:white;
            cursor:pointer;
            }
        button:hover{
            background:#0056b3;
            }
        #result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            color:rgb(195, 230, 66);
            }
        .operator{
            background:#F5923E;
            }
        .clear{
            background:#d63031;
           }
        .label{
            display:block;
            color:white;
            font-size:18px;
            font-weight:bold;
            margin-top:10px;
            margin-bottom:5px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>Calculator</h1>
        <form onsubmit="return false;">
        <label for="num1" class="label">First Number</label>
        <input type="text" id="num1" onclick="setInput('num1')" required>
        <br>
        <label for="num2" class="label">Second Number</label>
        <input type="text" id="num2" onclick="setInput('num2')" required>
    <div class="buttons">
    <button type="button" class="clear" onclick="clr()">AC</button>
    <button type="button" onclick="squareRoot()">√</button>
    <button type="button" onclick="cubeRoot()">∛</button>
    <button type="button" onclick="power()">xʸ</button>
    <button type="button" onclick="insert('7')">7</button>
    <button type="button" onclick="insert('8')">8</button>
    <button type="button" onclick="insert('9')">9</button>
    <button type="button" class="operator" onclick="divide()">÷</button>
    <button type="button" onclick="insert('4')">4</button>
    <button type="button" onclick="insert('5')">5</button>
    <button type="button" onclick="insert('6')">6</button>
    <button type="button" class="operator" onclick="multiply()">×</button>
    <button type="button" onclick="insert('1')">1</button>
    <button type="button" onclick="insert('2')">2</button>
    <button type="button" onclick="insert('3')">3</button>
    <button type="button" class="operator" onclick="subtract()">-</button>
    <button type="button" onclick="backspace()">⌫</button>
    <button type="button" onclick="insert('0')">0</button>
    <button type="button" onclick="insert('.')">.</button>
    
    <button type="button" class="operator" onclick="add()">+</button>
    </div>
    </form>
    <p id="result">Result :</p>
    </div>
<script>
    let activeInput = "num1";
    function setInput(id){
        activeInput = id;
    } 
    function insert(value){
        let input = document.getElementById(activeInput);
        if(value === "." && input.value.includes(".")){
        return;
    }
        input.value += value;
    }
    function clr(){
        document.getElementById("num1").value="";
        document.getElementById("num2").value="";
        document.getElementById("result").innerHTML="Result :";
        activeInput="num1";
    }
    function add(){
        let x=Number(document.getElementById("num1").value);
        let y=Number(document.getElementById("num2").value);
        let z=x+y;
        document.getElementById("result").innerHTML="Result : "+ z ;
    }
    function subtract(){
        let x=Number(document.getElementById("num1").value);
        let y=Number(document.getElementById("num2").value);
        let z=x-y;
        document.getElementById("result").innerHTML="Result : "+ z;
    }
    function multiply(){
        let x=Number(document.getElementById("num1").value);
        let y=Number(document.getElementById("num2").value);
        let z=x*y;
        document.getElementById("result").innerHTML="Result : "+ z;
    }
    function divide(){
        let x=Number(document.getElementById("num1").value);
        let y=Number(document.getElementById("num2").value);
        let z=x/y;
        if(y===0){
        document.getElementById("result").innerHTML="Cannot divide by zero";
        }
        else{
        document.getElementById("result").innerHTML="Result : "+ z;
        }
    }
    function squareRoot(){
        let x=Number(document.getElementById("num1").value);
        if(x<0){
        document.getElementById("result").innerHTML="Invalid Input";
        }
        else{
        document.getElementById("result").innerHTML="Result : "+Math.sqrt(x);
        }
    }
    function cubeRoot(){
        let x=Number(document.getElementById("num1").value);
        document.getElementById("result").innerHTML="Result : "+Math.cbrt(x);
    }
    function power(){
        let x=Number(document.getElementById("num1").value);
        let y=Number(document.getElementById("num2").value);
        document.getElementById("result").innerHTML="Result : "+Math.pow(x,y);
    }
    function backspace(){
        let input = document.getElementById(activeInput);
        input.value = input.value.slice(0,-1);
    }

</script>
</body>
</html>
